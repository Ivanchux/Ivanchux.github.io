<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CODE_CRT — Editor Retro | RETROTERM.AI</title>
  <link rel="stylesheet" href="editor.css">
  <link rel="icon" href="favicon.ico" />
  <style>
    .activa{
      display: block !important;
      opacity: 1 !important;
    }

    /* Tres columnas en escritorio */
    .editor-contenedor{
      display: flex;
      flex-wrap: nowrap;
      gap: 0;
      width: 100%;
      border: 2px solid #00ff66;
      border-radius: 4px;
      overflow: hidden;
      box-sizing: border-box;
    }

    .editor-par{
      display: flex;
      flex-direction: column;
      flex: 1 1 0;
    }

    .editor-par + .editor-par{
      border-left: 2px solid #00ff66;
    }

    /* Apilar en móvil */
    @media(max-width: 768px){
      .editor-contenedor{
        flex-wrap: wrap;
      }
      .editor-par{
        width: 100%;
        flex: none;
        border-left: none !important;
        border-top: 2px solid #00ff66;
      }
      .editor-par:first-child{
        border-top: none;
      }
    }
  </style>
</head>
<body>

<section class="pantalla activa pantalla-wide">

  <header class="cabecera">
    <h1>MODO DESARROLLO <span class="cursor-blink">|</span></h1>
    <p class="subtitulo">CODE_CRT — Editor retro integrado</p>
  </header>

  <div class="editor-contenedor">

    <div class="editor-par">
      <div class="editor-label editor-label-html">HTML</div>
      <textarea id="html-editor" class="editor-crt" spellcheck="false"><!-- HTML -->
<h1>Hola RetroTerm</h1>
<p>Escribe HTML, CSS y JS a la vez</p></textarea>
    </div>

    <div class="editor-par">
      <div class="editor-label editor-label-css">CSS</div>
      <textarea id="css-editor" class="editor-crt" spellcheck="false">/* CSS */
body { background: #000; color: #00ff66; font-family: 'Courier New', monospace; }
h1 { text-shadow: 0 0 6px #00ff66; }</textarea>
    </div>

    <div class="editor-par">
      <div class="editor-label editor-label-js">JS</div>
      <textarea id="js-editor" class="editor-crt" spellcheck="false">// JS
console.log("RetroCRT funcionando!");</textarea>
    </div>

  </div>

  <div class="editor-botones">
    <button id="ejecutar">&#9654; Ejecutar</button>
    <button id="limpiar">&#129529; Limpiar Preview</button>
    <button id="guardar">&#128190; Guardar</button>
  </div>

  <iframe loading="lazy" id="preview"></iframe>

  <a href="index.html" class="volver">&#8592; Volver al HUB</a>

</section>

<script>
  const htmlEditor = document.getElementById('html-editor');
  const cssEditor  = document.getElementById('css-editor');
  const jsEditor   = document.getElementById('js-editor');
  const preview    = document.getElementById('preview');

  function actualizarPreview(){
    const html = htmlEditor.value;
    const css  = "<style>" + cssEditor.value + "<\/style>";
    const js   = "<script>" + jsEditor.value + "<\/script>";
    preview.srcdoc = html + css + js;
  }

  document.getElementById('ejecutar').addEventListener('click', actualizarPreview);

  document.getElementById('limpiar').addEventListener('click', () => {
    preview.srcdoc = "";
  });

  document.getElementById('guardar').addEventListener('click', () => {
    localStorage.setItem('htmlCRT', htmlEditor.value);
    localStorage.setItem('cssCRT', cssEditor.value);
    localStorage.setItem('jsCRT', jsEditor.value);
    alert('Código guardado en el navegador.');
  });

  [htmlEditor, cssEditor, jsEditor].forEach(editor => {
    editor.addEventListener('input', actualizarPreview);
  });

  window.addEventListener('load', () => {
    const h = localStorage.getItem('htmlCRT');
    const c = localStorage.getItem('cssCRT');
    const j = localStorage.getItem('jsCRT');
    if(h) htmlEditor.value = h;
    if(c) cssEditor.value  = c;
    if(j) jsEditor.value   = j;
    actualizarPreview();
  });
</script>

</body>
</html>
